baseURL = "https://riktacoaching.com/"
languageCode = "en"
title = "Rikta Coaching"
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false
enableRobotsTXT = true
disableKinds = ["taxonomy","term","sitemap"]   # no taxonomies and custom sitemap handling
buildFuture = true

[params]
  canonical_base_url = "https://riktacoaching.com"
  primary = "#000000"
  background = "#FFFFFF"
  secondary = "#4773A6"
  accent = "#DA5B5F"
  stickyHeaderOffset = 72
  logo = "/img/logo.png"
  hero = "/img/psychologist-picture.jpg"
  # Update these whenever the consent copy or policy text changes.
  consent_statement_version_en = "2026-03-14"
  privacy_policy_version_en = "2026-03-14"
  # Cloudflare Turnstile public site key (safe to commit — only the secret stays in env vars)
  cf_turnstile_site_key = "0x4AAAAAACxMMnOV3SaFRnz2"

[markup]
  [markup.goldmark.renderer]
    unsafe = true                    # allow HTML in Markdown (sections/forms)

[outputs]
  home = ["HTML","RSS","JSON","SITEMAP_EN"]

[outputFormats.SITEMAP_EN]
  mediaType = "application/xml"
  baseName = "sitemap-en"
  isPlainText = true
  notAlternative = true
  rel = "sitemap"

# Optional: silence the "raw HTML omitted" warning
ignoreLogs = ['warning-goldmark-raw-html']

# Optional: if you want GA later:
#[services]
#  [services.googleAnalytics]
#    id = ""
