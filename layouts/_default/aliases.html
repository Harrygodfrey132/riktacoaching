<!doctype html>
<html lang="{{ .Lang }}">
<head>
  <meta charset="utf-8">
  <title>{{ .Permalink }}</title>
  <link rel="canonical" href="{{ .Permalink }}">
  <meta name="robots" content="noindex,follow">
  <meta http-equiv="refresh" content="0; url={{ .Permalink }}">
</head>
<body>
  {{ $isEn := or (eq .Lang "en") (hasPrefix .RelPermalink "/en/") }}
  <main>
    <h1>{{ if $isEn }}Redirecting…{{ else }}Du omdirigeras…{{ end }}</h1>
    <p>
      {{ if $isEn }}
        If you are not redirected automatically, <a href="{{ .Permalink }}">click here to continue</a>.
      {{ else }}
        Om du inte omdirigeras automatiskt, <a href="{{ .Permalink }}">klicka här för att fortsätta</a>.
      {{ end }}
    </p>
  </main>
</body>
</html>
