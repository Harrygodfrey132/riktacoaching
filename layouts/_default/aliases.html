<!doctype html>
<html lang="{{ .Lang }}">
<head>
  <meta charset="utf-8">
  <title>{{ .Permalink }}</title>
  <link rel="canonical" href="{{ .Permalink }}">
  <link rel="preconnect" href="https://connect.facebook.net" crossorigin>
  <link rel="dns-prefetch" href="https://connect.facebook.net">
  <link rel="preconnect" href="https://www.facebook.com" crossorigin>
  <link rel="dns-prefetch" href="https://www.facebook.com">
  <meta name="robots" content="noindex,follow">
  <meta http-equiv="refresh" content="0; url={{ .Permalink }}">
  <!-- Meta Pixel Code -->
  <script>
    !function(f,b,e,v,n,t,s)
    {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
    n.callMethod.apply(n,arguments):n.queue.push(arguments)};
    if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
    n.queue=[];t=b.createElement(e);t.async=!0;
    t.onload=function(){window._metaPixelLoaded=true;};
    t.onerror=function(){window._metaPixelError=true;};
    t.src=v;s=b.getElementsByTagName(e)[0];
    s.parentNode.insertBefore(t,s)}(window, document,'script',
    'https://connect.facebook.net/en_US/fbevents.js');
    fbq('init', '1616123489799623');
    fbq('track', 'PageView');
  </script>
  <script>
    (function(){
      var retryMs = 2000;
      function retryPixelLoad(){
        if (window._metaPixelLoaded) {
          return;
        }
        if (document.querySelector('script[data-meta-pixel-retry]')) {
          return;
        }
        var s = document.createElement('script');
        s.async = true;
        s.src = 'https://connect.facebook.net/en_US/fbevents.js';
        s.setAttribute('data-meta-pixel-retry', 'true');
        document.head.appendChild(s);
      }
      window.addEventListener('load', function(){
        setTimeout(retryPixelLoad, retryMs);
      });
    })();
  </script>
  <!-- End Meta Pixel Code -->
</head>
<body>
  <noscript><img height="1" width="1" style="display:none"
    src="https://www.facebook.com/tr?id=1616123489799623&ev=PageView&noscript=1"
  /></noscript>
  {{ $isEn := or (eq .Lang "en") (hasPrefix .RelPermalink "/en/") }}
  <main>
    <h1>{{ if $isEn }}Redirecting…{{ else }}Du omdirigeras…{{ end }}</h1>
    <p>
      {{ if $isEn }}
        If you are not redirected automatically, <a href="{{ .Permalink }}">click here to continue</a>.
      {{ else }}
        Om du inte omdirigeras automatiskt, <a href="{{ .Permalink }}">klicka här för att fortsätta</a>.
      {{ end }}
    </p>
  </main>
</body>
</html>
