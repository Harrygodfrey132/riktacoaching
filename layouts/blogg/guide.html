{{ define "main" }}
  {{ .Content }}
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      if (!window.matchMedia || !window.matchMedia('(max-width: 900px)').matches) return;
      const sections = Array.from(document.querySelectorAll('.guide-page .guide-section'));
      sections.forEach((section, index) => {
        if (index === 0) return; // keep the first content section expanded
        const container = section.querySelector('.container');
        const heading = section.querySelector('h2');
        if (!container || !heading) return;

        const details = document.createElement('details');
        details.className = 'guide-accordion';
        section.classList.add('guide-section--accordion');

        const summary = document.createElement('summary');
        summary.textContent = heading.textContent.trim();
        details.appendChild(summary);

        heading.remove();

        const body = document.createElement('div');
        body.className = 'guide-accordion__content';
        body.appendChild(container);
        details.appendChild(body);

        section.appendChild(details);
      });
    });
  </script>
{{ end }}
