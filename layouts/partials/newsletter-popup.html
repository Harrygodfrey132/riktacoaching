<script>
  (function preloadCal(){
    const preconnects = ["https://app.cal.com", "https://cdn.cal.com"];
    preconnects.forEach(url => {
      if (document.querySelector(`link[rel="preconnect"][href="${url}"]`)) return;
      const link = document.createElement('link');
      link.rel = 'preconnect';
      link.href = url;
      link.crossOrigin = 'anonymous';
      document.head.appendChild(link);
    });
    const scriptHref = "https://app.cal.com/embed/embed.js";
    if (!document.querySelector(`link[rel="preload"][href="${scriptHref}"]`)) {
      const preload = document.createElement('link');
      preload.rel = 'preload';
      preload.as = 'script';
      preload.href = scriptHref;
      preload.crossOrigin = 'anonymous';
      document.head.appendChild(preload);
    }
  })();
</script>
