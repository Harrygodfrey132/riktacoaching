{{ $isEn := or (eq .Lang "en") (hasPrefix .RelPermalink "/en/") }}
{{ $href := cond $isEn "/en/contact/#contact-form" "/kontakta-oss/#kontaktformular" }}
{{ $label := cond $isEn "Free consultation" "Gratis rådgivningssamtal" }}

<a class="btn primary fixed-cta"
   href="{{ $href }}"
   aria-label="{{ $label }}">
  <span class="fixed-cta__label">{{ $label }}</span>
  <span class="fixed-cta__icon" aria-hidden="true">→</span>
</a>
